<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link rel="icon" href="data:;" />
    <script
      src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"
      integrity="sha256-aS0B0wnsaDByLfE16h4MDCP1fQFccysd1YWOcV+gbBo="
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
      import React, { useState, useEffect } from "https://esm.sh/react@18?dev";
      import { createRoot } from "https://esm.sh/react-dom@18/client?dev";
      import * as zebar from "https://esm.sh/zebar@3";

      const providers = zebar.createProviderGroup({
        glazewm: { type: "glazewm" },
        network: { type: "network" },
        cpu:     { type: "cpu" },
        date:    { type: "date", formatting: "EEE d MMM" },
        time:    { type: "date", formatting: "HH:mm" },
        battery: { type: "battery" },
        memory:  { type: "memory" },
        weather: { type: "weather" },
      });

      createRoot(document.getElementById("root")).render(<App />);

      function App() {
        const [output, setOutput] = useState(providers.outputMap);

        useEffect(() => {
          providers.onOutput(() => setOutput(providers.outputMap));
        }, []);

        function getNetworkIcon(net) {
          switch (net.defaultInterface?.type) {
            case "ethernet":
              return <i className="nf nf-md-ethernet_cable"></i>;
            case "wifi":
              const s = net.defaultGateway?.signalStrength ?? 0;
              if (s >= 80) return <i className="nf nf-md-wifi_strength_4"></i>;
              if (s >= 65) return <i className="nf nf-md-wifi_strength_3"></i>;
              if (s >= 40) return <i className="nf nf-md-wifi_strength_2"></i>;
              if (s >= 25) return <i className="nf nf-md-wifi_strength_1"></i>;
              return <i className="nf nf-md-wifi_strength_outline"></i>;
            default:
              return <i className="nf nf-md-wifi_strength_off_outline"></i>;
          }
        }

        function getBatteryIcon(bat) {
          if (bat.chargePercent > 90) return <i className="nf nf-fa-battery_4"></i>;
          if (bat.chargePercent > 70) return <i className="nf nf-fa-battery_3"></i>;
          if (bat.chargePercent > 40) return <i className="nf nf-fa-battery_2"></i>;
          if (bat.chargePercent > 20) return <i className="nf nf-fa-battery_1"></i>;
          return <i className="nf nf-fa-battery_0"></i>;
        }

        function getWeatherIcon(w) {
          switch (w.status) {
            case "clear_day":         return <i className="nf nf-weather-day_sunny"></i>;
            case "clear_night":       return <i className="nf nf-weather-night_clear"></i>;
            case "cloudy_day":        return <i className="nf nf-weather-day_cloudy"></i>;
            case "cloudy_night":      return <i className="nf nf-weather-night_alt_cloudy"></i>;
            case "light_rain_day":    return <i className="nf nf-weather-day_sprinkle"></i>;
            case "light_rain_night":  return <i className="nf nf-weather-night_alt_sprinkle"></i>;
            case "heavy_rain_day":    return <i className="nf nf-weather-day_rain"></i>;
            case "heavy_rain_night":  return <i className="nf nf-weather-night_alt_rain"></i>;
            case "snow_day":          return <i className="nf nf-weather-day_snow"></i>;
            case "snow_night":        return <i className="nf nf-weather-night_alt_snow"></i>;
            case "thunder_day":       return <i className="nf nf-weather-day_lightning"></i>;
            case "thunder_night":     return <i className="nf nf-weather-night_alt_lightning"></i>;
            default:                  return <i className="nf nf-weather-day_sunny"></i>;
          }
        }

        const netLabel = output.network
          ? output.network.defaultInterface?.type === "wifi"
            ? (output.network.defaultGateway?.ssid ?? "Wi-Fi")
            : "Ethernet"
          : null;

        return (
          <div className="app">

            {/* ── LEFT ── workspaces e título da janela */}
            <div className="left">
              {output.glazewm && (
                <div className="workspaces">
                  {output.glazewm.currentWorkspaces.map(workspace => (
                    <button
                      key={workspace.name}
                      className={`workspace ${workspace.hasFocus ? 'focused' : ''} ${workspace.isDisplayed && !workspace.hasFocus ? 'displayed' : ''}`}
                      onClick={() => output.glazewm.runCommand(`focus --workspace ${workspace.name}`)}
                    >
                      {workspace.displayName ?? workspace.name}
                    </button>
                  ))}
                </div>
              )}
              {output.glazewm && output.glazewm.focusedContainer?.title && (
                <div style={{ color: 'var(--subtle)', fontSize: '11px', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis', maxWidth: '300px' }}>
                  {output.glazewm.focusedContainer.title}
                </div>
              )}
              {!output.glazewm && (
                <i className="logo nf nf-fa-windows"></i>
              )}
            </div>

            {/* ── CENTER ── data + hora em cápsula */}
            <div className="center">
              <div className="date-chip">
                <span>{output.date?.formatted}</span>
                <span className="sep">│</span>
                <span>{output.time?.formatted}</span>
              </div>
            </div>

            {/* ── RIGHT ── chips agrupados */}
            <div className="right">

              {/* Grupo: clima + rede */}
              {(output.weather || output.network) && (
                <div className="group">
                  {output.weather && (
                    <div className="chip">
                      {getWeatherIcon(output.weather)}
                      {Math.round(output.weather.celsiusTemp)}°C
                    </div>
                  )}
                  {output.network && (
                    <div className="chip">
                      {getNetworkIcon(output.network)}
                      {netLabel}
                    </div>
                  )}
                </div>
              )}

              {/* Grupo: memória + CPU */}
              {(output.memory || output.cpu) && (
                <div className="group">
                  {output.memory && (
                    <div className="chip">
                      <i className="nf nf-fae-chip"></i>
                      {Math.round(output.memory.usage)}%
                    </div>
                  )}
                  {output.cpu && (
                    <div className="chip">
                      <i className="nf nf-oct-cpu"></i>
                      <span className={output.cpu.usage > 85 ? "high-usage" : ""}>
                        {Math.round(output.cpu.usage)}%
                      </span>
                    </div>
                  )}
                </div>
              )}

              {/* Chip solo: bateria */}
              {output.battery && (
                <div className="chip-solo battery-wrap">
                  {output.battery.isCharging && (
                    <i className="nf nf-md-power_plug charging-icon"></i>
                  )}
                  {getBatteryIcon(output.battery)}
                  {Math.round(output.battery.chargePercent)}%
                </div>
              )}

            </div>
          </div>
        );
      }
    </script>
  </body>
</html>
